name: subly
description: "A subscription tracking app to help users manage their recurring expenses."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management & Navigation
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.2

  # Database & Models
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI & Charts
  fl_chart: ^0.70.2
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.16
  rive: ^0.13.19
  google_fonts: ^6.2.1

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Utilities
  http: ^1.2.2
  intl: ^0.20.1
  share_plus: ^10.1.4
  uuid: ^4.5.1
  path_provider: ^2.1.5
  shared_preferences: ^2.3.4
  url_launcher: ^6.3.1
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4
  build_runner: ^2.4.9
  drift_dev: ^2.18.0
  freezed: ^2.5.2
  json_serializable: ^6.7.1
  riverpod_generator: ^2.4.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/catalog/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/subly-logo.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#0F1119"
  adaptive_icon_foreground: "assets/subly-logo.png"

flutter_native_splash:
  color: "#0F0F23"
  image: "assets/subly-splash-logo.png"
  color_dark: "#0F0F23"
  image_dark: "assets/subly-splash-logo.png"
